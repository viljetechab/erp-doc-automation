name: Deploy ERP Doc Automation (DEV)

on:
  push:
    branches:
      - dev

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Checkout
      - name: Checkout Code
        uses: actions/checkout@v4

      # ----------------------
      # FRONTEND (VITE)
      # ----------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Frontend Dependencies
        working-directory: frontend
        run: npm install

      - name: Build Frontend
        working-directory: frontend
        run: npm run build

      - name: Deploy Frontend to Azure
        uses: azure/webapps-deploy@v2
        with:
          app-name: erp-doc-automation-dev-fe
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_FE }}
          package: frontend/dist

      # ----------------------
      # BACKEND (FASTAPI)
      # ----------------------
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Backend Dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Zip Backend
        run: |
          cd backend
          zip -r backend.zip .

      - name: Deploy Backend to Azure
        uses: azure/webapps-deploy@v2
        with:
          app-name: erp-doc-automation-dev-be
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_BE }}
          package: backend/backend.zip
