name: Deploy (Dev & Prod)

on:
  push:
    branches:
      - dev
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    environment:
      name: ${{ github.ref_name == 'main' && 'Prod' || 'Dev' }}

    steps:
      # -----------------------------
      # Checkout Code
      # -----------------------------
      - name: Checkout Code
        uses: actions/checkout@v4

      # -----------------------------
      # BACKEND (FastAPI)
      # -----------------------------
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Backend Dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Deploy Backend
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ github.ref_name == 'main' && 'erp-doc-automation-prod-be' || 'erp-doc-automation-dev-be' }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_BE }}
          package: backend

      # -----------------------------
      # FRONTEND (Vite)
      # -----------------------------
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Create Frontend ENV
        run: |
          echo "VITE_API_BASE_URL=${{ vars.VITE_API_BASE_URL }}" > frontend/.env

      - name: Install & Build Frontend
        run: |
          cd frontend
          npm install
          npm run build

      - name: Deploy Frontend
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ github.ref_name == 'main' && 'erp-doc-automation-prod-fe' || 'erp-doc-automation-dev-fe' }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_FE }}
          package: frontend
